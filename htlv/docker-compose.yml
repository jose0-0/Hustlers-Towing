services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hustlers-towing
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  web:
    external: true
